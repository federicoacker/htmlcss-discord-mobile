<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTMLCSS Discord Mobile</title>
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sigmar&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <header class="header">
        <img src="./imgs/banner.png"
            alt="Immagine banner di Discord con logo e grafica che mostra un computer e uno smartphone"
            class="header-banner">
    </header>
    <main class="main">
        <section class="download-section">
            <h1 class="titolo sigmar-regular text-center text-color">Group chat that's all fun & games</h1>
            <p class="download-section-text text-center text-color">
                Discord is great for playing games and chilling with friends,
                or even building a worldwide community. Customize your own space to talk, play,
                and hang out.</p>
            <button class="windows-download-button block-button"><i class="bi bi-cloud-download icon"></i>Download for Windows</button>
            <button class="open-in-browser-button block-button background-secondary text-color">Open Discord in your browser</button>
        </section>
        <section class="feature-preview-section"> test</section>
        <section class="feature-preview-section"> test</section>
    </main>
</body>

</html>
